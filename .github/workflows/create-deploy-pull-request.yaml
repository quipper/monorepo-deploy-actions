name: create-deploy-pull-request

on:
  pull_request:
    paths:
      - create-deploy-pull-request/**
      - '*.json'
      - '*.yaml'
      - .github/workflows/create-deploy-pull-request.yaml
  push:
    branches:
      - main
    paths:
      - create-deploy-pull-request/**
      - '*.json'
      - '*.yaml'
      - .github/workflows/create-deploy-pull-request.yaml

defaults:
  run:
    working-directory: create-deploy-pull-request

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions: 
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .node-version
      - run: npm install -g pnpm@latest-10
      - run: pnpm i
      - run: pnpm check
      - uses: int128/update-generated-files-action@35e85d10473f03dbf877833ad665894f1ccc3cdc # v2.96.0

  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions: 
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .node-version
      - run: npm install -g pnpm@latest-10
      - run: pnpm i
      - run: pnpm test

  e2e-test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions: 
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .node-version
      - run: npm install -g pnpm@latest-10
      - run: pnpm i
      - run: pnpm build
      - uses: ./create-deploy-pull-request
        with:
          head-branch: main
          base-branch: create-deploy-pull-request--e2e-test--${{ github.run_number }}
          title: E2E test of create-deploy-pull-request
          body: E2E test of create-deploy-pull-request
      - if: always()
        run: git push origin --delete 'refs/heads/create-deploy-pull-request--e2e-test--${{ github.run_number }}'
        continue-on-error: true
