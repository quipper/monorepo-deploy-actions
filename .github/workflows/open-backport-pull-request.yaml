name: open-backport-pull-request

on:
  pull_request:
    paths:
      - open-backport-pull-request/**
      - '*.json'
      - '*.yaml'
      - .github/workflows/open-backport-pull-request.yaml
  push:
    branches:
      - main
    paths:
      - open-backport-pull-request/**
      - '*.json'
      - '*.yaml'
      - .github/workflows/open-backport-pull-request.yaml

defaults:
  run:
    working-directory: open-backport-pull-request
  
jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions: 
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version-file: .node-version
      - run: npm install -g pnpm@latest-10
      - run: pnpm i
      - run: pnpm check
      - uses: int128/update-generated-files-action@f83cd1762d5cde0de059b0e91bf86399662fbb71 # v2.87.0

  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version-file: .node-version
      - run: npm install -g pnpm@latest-10
      - run: pnpm i
      - run: pnpm test
      - run: pnpm build

      # Smoke test. This should not create any pull request.
      - if: github.event_name == 'pull_request'
        uses: ./open-backport-pull-request
        with:
          head-branch: main
          base-branch: main
