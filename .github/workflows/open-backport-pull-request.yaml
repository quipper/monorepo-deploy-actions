name: open-backport-pull-request

on:
  pull_request:
    paths:
      - open-backport-pull-request/**
      - '*.json'
      - '*.yaml'
      - .github/workflows/open-backport-pull-request.yaml
  push:
    branches:
      - main
    paths:
      - open-backport-pull-request/**
      - '*.json'
      - '*.yaml'
      - .github/workflows/open-backport-pull-request.yaml

defaults:
  run:
    working-directory: open-backport-pull-request
  
jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions: 
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .node-version
      - run: npm install -g pnpm@latest-10
      - run: pnpm i
      - run: pnpm check
      - uses: int128/update-generated-files-action@78a2ec19f89c99123f47cfc500aece081cf10d7f # v2.88.0

  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .node-version
      - run: npm install -g pnpm@latest-10
      - run: pnpm i
      - run: pnpm test
      - run: pnpm build

      # Smoke test. This should not create any pull request.
      - if: github.event_name == 'pull_request'
        uses: ./open-backport-pull-request
        with:
          head-branch: main
          base-branch: main
