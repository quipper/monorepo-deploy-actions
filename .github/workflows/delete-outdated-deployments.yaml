name: delete-outdated-deployments

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:
  pull_request:
    paths:
      - .github/workflows/delete-outdated-deployments.yaml

jobs:
  delete:
    runs-on: ubuntu-slim
    timeout-minutes: 10
    permissions:
      deployments: write
    steps:
      - uses: int128/delete-deployments-action@33badf3d3b08d20b2ff8e25f921c24769b47cf14 # v1.56.0
