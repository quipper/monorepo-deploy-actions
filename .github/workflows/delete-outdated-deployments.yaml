name: delete-outdated-deployments

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:
  pull_request:
    paths:
      - .github/workflows/delete-outdated-deployments.yaml

jobs:
  delete:
    runs-on: ubuntu-slim
    timeout-minutes: 10
    steps:
      - uses: int128/delete-deployments-action@5770fdbcdb745a1c321907e455da2f7dd7106465 # v1.51.0
