name: delete-outdated-deployments

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:
  pull_request:
    paths:
      - .github/workflows/delete-outdated-deployments.yaml

jobs:
  delete:
    runs-on: ubuntu-slim
    timeout-minutes: 10
    steps:
      - uses: int128/delete-deployments-action@4d35e761b413c0b259ab55824e9cf59ae737cec4 # v1.52.0
