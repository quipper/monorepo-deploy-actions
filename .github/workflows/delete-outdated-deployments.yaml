name: delete-outdated-deployments

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:
  pull_request:
    paths:
      - .github/workflows/delete-outdated-deployments.yaml

jobs:
  delete:
    runs-on: ubuntu-slim
    timeout-minutes: 10
    permissions:
      deployments: write
    steps:
      - uses: int128/delete-deployments-action@af5bbaf21fa14ea1e0e14a5799fae03e0f076b3c # v1.54.0
