name: delete-outdated-deployments

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:
  pull_request:
    paths:
      - .github/workflows/delete-outdated-deployments.yaml

jobs:
  delete:
    runs-on: ubuntu-slim
    timeout-minutes: 10
    permissions:
      deployments: write
    steps:
      - uses: int128/delete-deployments-action@ea5f414eb0ca464aabc68c86aa16e1877e2d9843 # v1.57.0
